<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        margin: 0;
        padding: 0;
        background-image: url(https://png.pngtree.com/background/20250319/original/pngtree-design-your-project-with-a-vector-light-background-featuring-abstract-white-picture-image_15298137.jpg);
        background-size: cover;      
    background-repeat: no-repeat;

    }
    #div1{
        margin: 50px;
        margin-left: 50px;;
        margin-right: 50px;
        border-radius: 140px;
        width: auto;
        height: 100px;
        border: 2px solid black;
        background-color: darksalmon;
        
    }

    #div1:hover{
        border-radius: 0;
        background-color: rgb(230, 167, 244);
    }

    h1{
        text-align: center;
        padding-top: 5px;
        color: maroon;
        
    }

    .table{
        
    border-collapse: collapse;
    width: 50%;
    margin: auto;
    margin-top: 80px;
    }

    th, td {
    border: 2px solid black; 
    padding: 8px; 
    text-align: left; 
  }

 th{
    background-color: blue;
 }

 tr{
    background-color: white;
 }

 tr:hover{
    background-color: gray;
 }

 
 
</style>
<body>
    <div id="div1">
        <strong><h1>Sample Online Items And Their Prices</h1></strong>
    </div>

    
    <div id="div2">
        <table class="table">
            <tr>
                <th>PRODUCT</th>
                <th>PRICES</th>

            </tr>

            <tr>
                <td>Laptop</td>
                <td>$800</td>
                
            </tr>

            <tr>
                <td>Headphones</td>
                <td>$50</td>
            </tr>

            <tr>
                <td>Smartphone</td>
                <td>$700</td>
            </tr>

            <tr>
                <td>Refrigeretator</td>
                <td>$350</td>
            </tr>

            <tr>
                <td>Air Conditioner</td>
                <td>$500</td>
            </tr>
        </table>
    </div>
    

    
    
</body>
</html>
